<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Content Security Policy is enforced via HTTP response header in firebase.json -->
  <!-- (meta tag moved to firebase.json hosting.headers — enables frame-ancestors enforcement) -->

  <!-- Preconnect to critical third-party origins (saves ~415ms Google, ~377ms PostHog) -->
  <link rel="preconnect" href="https://apis.google.com" />
  <link rel="preconnect" href="https://us-assets.i.posthog.com" crossorigin />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/pwa-192x192.png" />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- SEO Meta Tags -->
  <title>ActionStation - AI-Powered Visual Thinking Canvas</title>
  <meta name="description" content="ActionStation is an AI-powered infinite whiteboard for creating, connecting, and synthesizing ideas. Think visually and boost your productivity." />
  <meta name="keywords" content="AI whiteboard, visual thinking, idea canvas, brainstorming, mind mapping, productivity" />
  <meta name="author" content="ActionStation" />
  
  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://actionstation.app/" />
  <meta property="og:title" content="ActionStation - AI-Powered Visual Thinking Canvas" />
  <meta property="og:description" content="AI-powered infinite whiteboard for creating, connecting, and synthesizing ideas." />
  <meta property="og:image" content="https://actionstation.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ActionStation - AI-Powered Visual Thinking Canvas" />
  <meta name="twitter:description" content="AI-powered infinite whiteboard for creating, connecting, and synthesizing ideas." />
  <meta name="twitter:image" content="https://actionstation.app/og-image.png" />

  <!-- Canonical URL -->
  <!-- Canonical URL — hardcoded to production origin (no SSR / SSG yet; all routes serve same HTML) -->
  <link rel="canonical" href="https://actionstation.app/" />
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#3373cc" />

  <!-- Anti-flash theme script: apply stored theme before first paint to prevent light flash -->
  <script src="/theme-init.js"></script>
</head>

<body>
  <div id="root"></div>
  <div id="portal-root"></div>
  <noscript>ActionStation requires JavaScript to run. Please enable JavaScript in your browser.</noscript>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
